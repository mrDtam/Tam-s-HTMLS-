<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadratic Equations Mastery</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 90vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #2c3e50; margin-top: 0; margin-bottom: 5px; text-transform: uppercase; }
        .disclaimer { color: #7f8c8d; font-size: 15px; margin-bottom: 25px; }

        /* --- Menu Screen --- */
        #menuScreen { display: block; }
        .level-section {
            margin-bottom: 30px;
            padding: 20px;
            border-radius: 8px;
            text-align: left;
        }
        .level-1-2 { background-color: rgba(243, 156, 18, 0.1); border-left: 5px solid #f39c12; }
        .level-3-4 { background-color: rgba(241, 196, 15, 0.1); border-left: 5px solid #f1c40f; }
        
        .level-title { font-size: 20px; font-weight: bold; margin-bottom: 15px; color: #2c3e50; }
        
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .menu-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 0 #2980b9;
            transition: all 0.2s;
        }
        .menu-btn:hover { background-color: #2980b9; transform: translateY(2px); box-shadow: 0 2px 0 #1f618d; }
        .menu-btn:active { transform: translateY(4px); box-shadow: none; }
        
        .menu-btn.conceptual { background-color: #9b59b6; box-shadow: 0 4px 0 #8e44ad; }
        .menu-btn.conceptual:hover { background-color: #8e44ad; box-shadow: 0 2px 0 #732d91; }

        /* --- Game Screen --- */
        #gameScreen { display: none; }
        
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .back-btn {
            background-color: #ecf0f1;
            color: #7f8c8d;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .back-btn:hover { background-color: #e0e6ed; }
        
        .streak-counter {
            font-size: 18px;
            font-weight: bold;
            color: #27ae60;
            background: #e8f8f5;
            padding: 8px 15px;
            border-radius: 8px;
            border: 2px solid #27ae60;
        }

        .prompt-title { font-size: 20px; color: #34495e; font-weight: bold; margin-bottom: 15px; }

        .problem-display {
            font-size: 38px;
            margin: 0 0 30px 0;
            padding: 25px;
            background-color: #fdfbf7;
            border-radius: 12px;
            border: 2px solid #f39c12;
            color: #d35400;
            min-height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s;
        }
        .problem-display.error {
            background-color: #fadbd8;
            border-color: #e74c3c;
            animation: shake 0.4s;
        }

        /* MCQ Grid */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background-color: white;
            color: #2c3e50;
            border: 2px solid #bdc3c7;
            padding: 20px 10px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 #bdc3c7;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .option-btn:hover {
            background-color: #f0f8ff;
            border-color: #3498db;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #2980b9;
        }
        .option-btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: none;
        }
        .option-btn.correct {
            background-color: #e8f8f5 !important;
            border-color: #2ecc71 !important;
            box-shadow: 0 4px 0 #27ae60 !important;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }

        @media (max-width: 600px) {
            .menu-grid { grid-template-columns: 1fr; }
            .options-grid { grid-template-columns: 1fr; }
            .problem-display { font-size: 28px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Quadratic Equations</h1>
    <div class="disclaimer">Select a skill to practice.</div>
    
    <div id="menuScreen">
        
        <div class="level-section level-1-2">
            <div class="level-title">Level 1 - Level 2</div>
            <div class="menu-grid">
                <button class="menu-btn" onclick="startMode(1)">Factor Polynomials (Mixed Review)</button>
                <button class="menu-btn" onclick="startMode(2)">Solve Factored Equations</button>
            </div>
        </div>

        <div class="level-section level-3-4">
            <div class="level-title">Level 3 - Level 4</div>
            <div class="menu-grid">
                <button class="menu-btn" onclick="startMode(3)">Solve by Factoring</button>
                <button class="menu-btn" onclick="startMode(4)">Solve by Quadratic Formula (Rounded)</button>
                <button class="menu-btn" onclick="startMode(5)">Solve Layered Equations</button>
                <button class="menu-btn conceptual" onclick="startMode(6)">Conceptual: Find valid 'b'</button>
            </div>
        </div>

    </div>

    <div id="gameScreen">
        <div class="game-header">
            <button class="back-btn" onclick="showMenu()">🔙 Menu</button>
            <div class="streak-counter">Streak: <span id="streakDisplay">0</span></div>
        </div>

        <div class="prompt-title" id="promptTitle">Solve for x:</div>
        <div class="problem-display" id="problemDisplay"></div>

        <div class="options-grid" id="optionsGrid">
            </div>
    </div>
</div>

<script>
    let currentMode = 1;
    let currentStreak = 0;
    let isTransitioning = false;

    // --- Math Utilities ---
    function getRandomNonZero(min, max) {
        let val; do { val = Math.floor(Math.random() * (max - min + 1)) + min; } while (val === 0);
        return val;
    }
    
    function gcd(x, y) {
        x = Math.abs(x); y = Math.abs(y);
        while(y) { let t = y; y = x % y; x = t; }
        return x;
    }
    function gcd3(x, y, z) { return gcd(gcd(x, y), z); }

    // Creates formatted LaTeX fractions perfectly pulling negatives out front
    function toFrac(num, den) {
        if (den < 0) { num = -num; den = -den; }
        let g = gcd(num, den);
        num /= g; den /= g;
        if (den === 1) return num.toString();
        if (num < 0) return `-\\frac{${Math.abs(num)}}{${den}}`;
        return `\\frac{${num}}{${den}}`;
    }
    
    // Sorts and formats the roots cleanly
    function formatRoots(n1, d1, n2, d2) {
        let r1 = toFrac(n1, d1);
        let r2 = toFrac(n2, d2);
        let arr = [r1, r2].sort(); 
        if (arr[0] === arr[1]) return `x = ${arr[0]}`; // Handles double roots
        return `x = ${arr[0]}, \\; x = ${arr[1]}`;
    }

    function term(c, v, isFirst) {
        if (c === 0) return "";
        let absC = Math.abs(c);
        let cStr = (absC === 1 && v !== "") ? "" : absC;
        let sign = (c < 0) ? (isFirst ? "-" : " - ") : (isFirst ? "" : " + ");
        return `${sign}${cStr}${v}`;
    }
    
    function formatBinomial(a, b, v = 'x') { return `(${term(a, v, true)}${term(b, '', false)})`; }
    
    function formatQuadratic(a, b, c, v = 'x') {
        let p1 = term(a, `${v}^2`, true);
        let p2 = term(b, v, p1 === "");
        let p3 = term(c, "", p1 === "" && p2 === "");
        return `${p1}${p2}${p3}`;
    }

    function formatCubic(a, b, c, d, v = 'x') {
        let p1 = term(a, `${v}^3`, true);
        let p2 = term(b, `${v}^2`, p1 === "");
        let p3 = term(c, v, p1 === "" && p2 === "");
        let p4 = term(d, "", p1 === "" && p2 === "" && p3 === "");
        return `${p1}${p2}${p3}${p4}`;
    }

    function shuffle(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // --- Game Navigation ---
    function startMode(mode) {
        currentMode = mode;
        currentStreak = 0;
        document.getElementById('streakDisplay').innerText = currentStreak;
        document.getElementById('menuScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';
        generateProblem();
    }

    function showMenu() {
        document.getElementById('gameScreen').style.display = 'none';
        document.getElementById('menuScreen').style.display = 'block';
    }

    // --- Failsafe Ensure 4 Unique Options ---
    function fillOptions(optionSet, correctTeX, fallbackGeneratorFn) {
        optionSet.add(correctTeX);
        let offset = 1;
        while(optionSet.size < 4) {
            let fallback = fallbackGeneratorFn(offset);
            if (!optionSet.has(fallback)) optionSet.add(fallback);
            offset++;
        }
        return optionSet;
    }

    // --- Problem Generation ---
    function generateProblem() {
        isTransitioning = false;
        
        let promptTeX = "";
        let correctTeX = "";
        let distractors = [];
        let optionSet = new Set();

        if (currentMode === 1) {
            // Factor Polynomials (Mixed Types)
            document.getElementById('promptTitle').innerText = "Factor completely:";
            let subMode = getRandomNonZero(1, 5);
            
            if (subMode === 1) { // Basic
                let r1 = getRandomNonZero(-9, 9);
                let r2; do { r2 = getRandomNonZero(-9, 9); } while (r1 === -r2);
                promptTeX = formatQuadratic(1, r1+r2, r1*r2);
                correctTeX = `${formatBinomial(1, r1)}${formatBinomial(1, r2)}`;
                distractors.push(`${formatBinomial(1, -r1)}${formatBinomial(1, -r2)}`);
                distractors.push(`${formatBinomial(1, r1)}${formatBinomial(1, -r2)}`);
            } else if (subMode === 2) { // Advanced ax^2
                let a, c, b, d;
                do {
                    a = getRandomNonZero(2, 5); c = getRandomNonZero(1, 4);
                    b = getRandomNonZero(-6, 6); d = getRandomNonZero(-6, 6);
                } while (a*c === 1 || b*d === 0 || (a*d + b*c) === 0 || gcd(a, b) > 1 || gcd(c, d) > 1);
                promptTeX = formatQuadratic(a*c, a*d+b*c, b*d);
                correctTeX = `${formatBinomial(a, b)}${formatBinomial(c, d)}`;
                distractors.push(`${formatBinomial(a, -b)}${formatBinomial(c, -d)}`);
                distractors.push(`${formatBinomial(a, d)}${formatBinomial(c, b)}`);
            } else if (subMode === 3) { // Diff of Squares
                let a, b; do { a = getRandomNonZero(1, 6); b = getRandomNonZero(1, 10); } while (gcd(a, b) > 1);
                promptTeX = formatQuadratic(a*a, 0, -(b*b));
                correctTeX = `${formatBinomial(a, b)}${formatBinomial(a, -b)}`;
                distractors.push(`${formatBinomial(a, b)}^2`);
                distractors.push(`${formatBinomial(a*a, b)}${formatBinomial(a*a, -b)}`);
            } else if (subMode === 4) { // GCF Trinomial
                let k = getRandomNonZero(2, 5);
                let r1 = getRandomNonZero(-6, 6); let r2; do { r2 = getRandomNonZero(-6, 6); } while (r1 === -r2);
                promptTeX = formatQuadratic(k, k*(r1+r2), k*(r1*r2));
                correctTeX = `${k}${formatBinomial(1, r1)}${formatBinomial(1, r2)}`;
                distractors.push(`${k}${formatBinomial(1, -r1)}${formatBinomial(1, -r2)}`);
                distractors.push(`(${formatBinomial(1, r1*k)}${formatBinomial(1, r2)})`);
            } else if (subMode === 5) { // Grouping
                let a = getRandomNonZero(1, 4); let c = getRandomNonZero(-5, 5); let b = getRandomNonZero(-5, 5);
                promptTeX = formatCubic(a, a*c, b, b*c);
                correctTeX = `${formatBinomial(a, b, 'x^2')}${formatBinomial(1, c, 'x')}`;
                distractors.push(`${formatBinomial(a, -b, 'x^2')}${formatBinomial(1, c, 'x')}`);
                distractors.push(`${formatBinomial(a, b, 'x')}${formatBinomial(1, c, 'x')}`);
            }
            
            optionSet.add(correctTeX);
            distractors.forEach(d => optionSet.add(d));
            fillOptions(optionSet, correctTeX, (offset) => `${formatBinomial(1, offset)}${formatBinomial(1, -offset-1)}`);
        }
        else if (currentMode === 2) {
            // Solve Factored Equation
            document.getElementById('promptTitle').innerText = "Solve for x:";
            let a = getRandomNonZero(1, 4); let b = getRandomNonZero(-9, 9);
            let c = getRandomNonZero(1, 4); let d = getRandomNonZero(-9, 9);
            
            promptTeX = `${formatBinomial(a, b)}${formatBinomial(c, d)} = 0`;
            correctTeX = formatRoots(-b, a, -d, c);
            
            distractors.push(formatRoots(b, a, d, c)); // Sign error
            distractors.push(formatRoots(-a, b, -c, d)); // Flipped fractions
            distractors.push(formatRoots(b, a, -d, c)); // Mixed sign error
            
            distractors.forEach(d => optionSet.add(d));
            fillOptions(optionSet, correctTeX, (offset) => formatRoots(-b + (offset*a), a, -d - (offset*c), c));
        }
        else if (currentMode === 3 || currentMode === 5) {
            // Solve by Factoring OR Layered Equations (Now with a > 1 capability)
            let a, c, b, d;
            do {
                a = getRandomNonZero(1, 4); c = getRandomNonZero(1, 4);
                b = getRandomNonZero(-6, 6); d = getRandomNonZero(-6, 6);
            } while (gcd(a, b) > 1 || gcd(c, d) > 1); // Ensures fractions are pre-reduced

            // 50% chance to force it to be an a=1 basic trinomial to maintain a good mix
            if (Math.random() > 0.5) { a = 1; c = 1; }

            let A_base = a * c;
            let B_base = a * d + b * c;
            let C_base = b * d;
            
            if (currentMode === 3) {
                document.getElementById('promptTitle').innerText = "Solve by factoring:";
                promptTeX = `${formatQuadratic(A_base, B_base, C_base)} = 0`;
            } else {
                document.getElementById('promptTitle').innerText = "Simplify to standard form, then solve for x:";
                let D = getRandomNonZero(-3, 3);
                let E = getRandomNonZero(-5, 5);
                let F = getRandomNonZero(-5, 5);
                promptTeX = `${formatQuadratic(A_base+D, B_base+E, C_base+F)} = ${formatQuadratic(D, E, F)}`;
            }

            correctTeX = formatRoots(-b, a, -d, c);
            distractors.push(formatRoots(b, a, d, c)); // Forgot to flip signs
            distractors.push(formatRoots(-b, a, d, c)); // Mixed sign error
            
            distractors.forEach(d => optionSet.add(d));
            fillOptions(optionSet, correctTeX, (offset) => formatRoots(-b + (offset*a), a, -d - (offset*c), c));
        }
        else if (currentMode === 4) {
            // Quadratic Formula (Decimals)
            document.getElementById('promptTitle').innerText = "Solve for x (Rounded to 2 decimal places):";
            let a, b, c, disc;
            do {
                a = getRandomNonZero(-4, 4);
                b = getRandomNonZero(-10, 10);
                c = getRandomNonZero(-10, 10);
                disc = (b*b) - (4*a*c);
            } while (disc <= 0 || Math.sqrt(disc) % 1 === 0);

            promptTeX = `${formatQuadratic(a, b, c)} = 0`;
            
            let ans1 = (-b + Math.sqrt(disc)) / (2*a);
            let ans2 = (-b - Math.sqrt(disc)) / (2*a);
            
            let rts = [ans1, ans2].sort((x, y) => x - y); // Sort numerical arrays safely
            correctTeX = `x \\approx ${rts[0].toFixed(2)}, \\; x \\approx ${rts[1].toFixed(2)}`;
            
            let rtsSignErr = [-ans1, -ans2].sort((x, y) => x - y);
            distractors.push(`x \\approx ${rtsSignErr[0].toFixed(2)}, \\; x \\approx ${rtsSignErr[1].toFixed(2)}`); // Missed -b
            
            let rtsDivErr = [ans1*2, ans2*2].sort((x, y) => x - y);
            distractors.push(`x \\approx ${rtsDivErr[0].toFixed(2)}, \\; x \\approx ${rtsDivErr[1].toFixed(2)}`); // Forgot 2a
            
            distractors.forEach(d => optionSet.add(d));
            fillOptions(optionSet, correctTeX, (offset) => `x \\approx ${(rts[0]+offset).toFixed(2)}, \\; x \\approx ${(rts[1]-offset).toFixed(2)}`);
        }
        else if (currentMode === 6) {
            // Conceptual Find B
            document.getElementById('promptTitle').innerText = "Which value for 'b' makes this polynomial factorable?";
            let m = getRandomNonZero(-8, 8);
            let n; do { n = getRandomNonZero(-8, 8); } while (Math.abs(m) === Math.abs(n));
            let c = m * n;
            let correctB = m + n;
            
            promptTeX = `x^2 + bx ${term(c, '', false)}`;
            correctTeX = `b = ${correctB}`;
            optionSet.add(correctTeX);
            
            let isValidB = (bVal) => {
                let disc = (bVal * bVal) - (4 * 1 * c);
                return (disc >= 0 && Math.sqrt(disc) % 1 === 0);
            };

            let attempt1 = m - n; 
            let attempt2 = c; 
            if (!isValidB(attempt1)) optionSet.add(`b = ${attempt1}`);
            if (!isValidB(attempt2)) optionSet.add(`b = ${attempt2}`);

            fillOptions(optionSet, correctTeX, (offset) => {
                let testB = correctB + offset;
                while(isValidB(testB)) { testB += 3; } 
                return `b = ${testB}`;
            });
        }

        renderProblem(promptTeX, correctTeX, Array.from(optionSet));
    }

    // --- Render and Validate ---
    function renderProblem(promptTeX, correctTeX, optionsArray) {
        document.getElementById('problemDisplay').innerHTML = `\\(${promptTeX}\\)`;
        
        let shuffled = shuffle(optionsArray);
        const grid = document.getElementById('optionsGrid');
        grid.innerHTML = ''; 

        shuffled.forEach(opt => {
            let btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `\\(${opt}\\)`;
            btn.onclick = () => {
                if (isTransitioning) return;
                
                if (opt === correctTeX) {
                    btn.classList.add('correct');
                    isTransitioning = true;
                    currentStreak++;
                    document.getElementById('streakDisplay').innerText = currentStreak;
                    setTimeout(generateProblem, 800);
                } else {
                    currentStreak = 0;
                    document.getElementById('streakDisplay').innerText = currentStreak;
                    
                    let display = document.getElementById('problemDisplay');
                    display.classList.add('error');
                    
                    setTimeout(() => {
                        display.classList.remove('error');
                        generateProblem(); 
                    }, 600);
                }
            };
            grid.appendChild(btn);
        });

        if (window.renderMathInElement) {
            renderMathInElement(document.getElementById('gameScreen'), { delimiters: [{left: "\\(", right: "\\)", display: false}] });
        }
    }

    window.onload = () => {
        if (window.renderMathInElement) {
            renderMathInElement(document.body, { delimiters: [{left: "\\(", right: "\\)", display: false}] });
        }
    }
</script>

</body>
</html>
