<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factoring Quadratics Practice</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-top: 0;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .streak-counter {
            font-size: 16px;
            color: #7f8c8d;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .problem-display {
            font-size: 32px;
            margin: 30px 0;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border: 1px solid #e9ecef;
            color: #2c3e50;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .option-btn {
            background-color: white;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            padding: 20px 10px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #34495e;
            box-shadow: 0 2px 0 #bdc3c7;
        }
        .option-btn:hover:not(:disabled) {
            border-color: #3498db;
            background-color: #f0f8ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 0 #3498db;
        }
        .option-btn:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: 0 0 0 #3498db;
        }
        .option-btn:disabled {
            cursor: default;
        }
        .option-btn.correct {
            background-color: #e8f8f5;
            border-color: #2ecc71;
            color: #27ae60;
            box-shadow: 0 2px 0 #2ecc71;
        }
        .option-btn.wrong {
            background-color: #fadbd8;
            border-color: #e74c3c;
            color: #c0392b;
            box-shadow: 0 2px 0 #e74c3c;
            animation: shake 0.4s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
        @media (max-width: 480px) {
            .options-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Factor Completely</h1>
    <div class="streak-counter">Current Streak: <span id="streak">0</span></div>
    
    <div class="problem-display" id="problemDisplay">
        </div>

    <div class="options-grid" id="optionsGrid">
        </div>
</div>

<script>
    let currentStreak = 0;
    let isTransitioning = false;

    // Helper to format the quadratic x^2 + bx + c properly without "+ -3"
    function formatQuadratic(b, c) {
        let str = "x^2";
        
        if (b === 1) str += " + x";
        else if (b === -1) str += " - x";
        else if (b > 0) str += ` + ${b}x`;
        else if (b < 0) str += ` - ${Math.abs(b)}x`;

        if (c > 0) str += ` + ${c}`;
        else if (c < 0) str += ` - ${Math.abs(c)}`;
        
        return str;
    }

    // Helper to format factors (x + p)
    function formatFactor(num) {
        if (num === 0) return "x";
        return num > 0 ? `(x + ${num})` : `(x - ${Math.abs(num)})`;
    }

    // Generate the binomial product string
    function formatAnswer(p, q) {
        // Standardize output so (x+2)(x+3) is the same as (x+3)(x+2) for comparison
        let factors = [p, q].sort((a, b) => b - a); 
        if (factors[0] === 0 && factors[1] === 0) return "x^2";
        if (factors[0] === 0) return `x${formatFactor(factors[1])}`;
        if (factors[1] === 0) return `x${formatFactor(factors[0])}`;
        return `${formatFactor(factors[0])}${formatFactor(factors[1])}`;
    }

    // Shuffle array utility
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function generateProblem() {
        isTransitioning = false;
        const grid = document.getElementById('optionsGrid');
        grid.innerHTML = ''; // Clear old buttons

        // 1. Generate roots (p and q) between -12 and 12, excluding 0 to focus on trinomials
        let p, q;
        do {
            p = getRandomInt(-10, 10);
            q = getRandomInt(-10, 10);
        } while (p === 0 || q === 0);

        let b = p + q;
        let c = p * q;

        // 2. Set the problem text
        const problemStr = `\\(${formatQuadratic(b, c)}\\)`;
        document.getElementById('problemDisplay').innerHTML = problemStr;

        // 3. Generate correct answer
        const correctAnswer = formatAnswer(p, q);
        let options = new Set();
        options.add(correctAnswer);

        // 4. Generate intelligent distractors (common sign errors)
        const distractors = [
            formatAnswer(-p, -q),   // Both signs flipped
            formatAnswer(p, -q),    // One sign flipped
            formatAnswer(-p, q),    // Other sign flipped
            formatAnswer(p+1, q-1), // Minor arithmetic error
            formatAnswer(c, 1),     // Guessed c and 1
            formatAnswer(-c, -1)    // Guessed -c and -1
        ];

        // Fill the set until we have 4 unique options
        for (let dist of distractors) {
            if (options.size < 4 && dist !== correctAnswer) {
                options.add(dist);
            }
        }
        
        // If still need more due to weird overlap, add random ones
        while(options.size < 4) {
            let rp = getRandomInt(-10, 10);
            let rq = getRandomInt(-10, 10);
            let rDist = formatAnswer(rp, rq);
            if(rDist !== correctAnswer) options.add(rDist);
        }

        // 5. Shuffle and render buttons
        let optionsArray = shuffleArray(Array.from(options));

        optionsArray.forEach(opt => {
            let btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `\\(${opt}\\)`;
            btn.onclick = () => handleGuess(btn, opt === correctAnswer);
            grid.appendChild(btn);
        });

        // 6. Tell KaTeX to render the new math
        renderMathInElement(document.getElementById('problemDisplay'));
        renderMathInElement(document.getElementById('optionsGrid'));
    }

    function handleGuess(btn, isCorrect) {
        if (isTransitioning) return; // Prevent multiple clicks

        const allBtns = document.querySelectorAll('.option-btn');

        if (isCorrect) {
            isTransitioning = true;
            btn.classList.add('correct');
            currentStreak++;
            document.getElementById('streak').innerText = currentStreak;
            
            // Disable all buttons
            allBtns.forEach(b => b.disabled = true);

            // Auto-advance after 1 second
            setTimeout(generateProblem, 1000);
        } else {
            btn.classList.add('wrong');
            currentStreak = 0;
            document.getElementById('streak').innerText = currentStreak;
            
            // Remove wrong class after animation so they can try again
            setTimeout(() => {
                btn.classList.remove('wrong');
            }, 500);
        }
    }

    // Start the app
    window.onload = generateProblem;
</script>

</body>
</html>
