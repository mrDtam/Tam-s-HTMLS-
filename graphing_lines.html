<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Graphing Practice</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js" onload="generateProblem()"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-top: 0;
            font-size: 22px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .radio-group {
            background: #f8f9fa;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
            cursor: pointer;
            font-weight: bold;
            color: #2c3e50;
            user-select: none;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-weight: bold;
            color: #7f8c8d;
        }
        #streak {
            color: #3498db;
            font-size: 18px;
        }
        .problem-display {
            font-size: 36px;
            margin: 15px 0 25px 0;
            padding: 15px;
            background-color: #f0f8ff;
            border-radius: 8px;
            border: 2px solid #3498db;
            color: #2c3e50;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .problem-display.correct {
            background-color: #e8f8f5;
            border-color: #2ecc71;
            color: #27ae60;
        }
        .problem-display.wrong {
            background-color: #fadbd8;
            border-color: #e74c3c;
            color: #c0392b;
            animation: shake 0.4s;
        }
        canvas {
            background-color: #fff;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            cursor: crosshair;
            touch-action: none;
            max-width: 100%;
            height: auto;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }
        button {
            flex: 1;
            padding: 15px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            border: none;
        }
        button.submit-btn {
            background-color: #2ecc71;
            color: white;
            box-shadow: 0 4px 0 #27ae60;
        }
        button.submit-btn:hover {
            background-color: #27ae60;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1e8449;
        }
        button.submit-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        button.secondary-btn {
            background-color: #ecf0f1;
            color: #7f8c8d;
            box-shadow: 0 4px 0 #bdc3c7;
        }
        button.secondary-btn:hover {
            background-color: #e0e6ed;
            color: #34495e;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #95a5a6;
        }
        button.secondary-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Graph The Line</h1>
    
    <div class="controls">
        <label class="radio-group">
            <input type="radio" name="mode" value="slopeInt" checked onchange="generateProblem()"> y = mx + b
        </label>
        <label class="radio-group">
            <input type="radio" name="mode" value="standard" onchange="generateProblem()"> Ax + By = C
        </label>
    </div>

    <div class="stats">
        <span>Drag the points to match the equation</span>
        <span>Streak: <span id="streak">0</span></span>
    </div>
    
    <div class="problem-display" id="problemDisplay">
        </div>

    <canvas id="graphCanvas" width="500" height="500"></canvas>

    <div class="action-buttons">
        <button class="secondary-btn" onclick="generateProblem()">Generate New</button>
        <button class="submit-btn" onclick="checkAnswer()">Check Answer</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('graphCanvas');
    const ctx = canvas.getContext('2d');
    const problemDisplay = document.getElementById('problemDisplay');
    const streakDisplay = document.getElementById('streak');

    const gridSize = 20; 
    const pixelsPerUnit = canvas.width / gridSize;
    const originX = canvas.width / 2;
    const originY = canvas.height / 2;

    let currentStreak = 0;
    let targetA = 0, targetB = 0, targetC = 0; 
    let isTransitioning = false;

    let p1 = { x: -3, y: -2 };
    let p2 = { x: 3, y: 4 };
    let draggingPoint = null;

    function gcd(a, b) {
        a = Math.abs(a);
        b = Math.abs(b);
        while (b) { let temp = b; b = a % b; a = temp; }
        return a;
    }

    function getRandomNonZero(min, max) {
        let val;
        do { val = Math.floor(Math.random() * (max - min + 1)) + min; } while (val === 0);
        return val;
    }

    function generateProblem() {
        if (isTransitioning) return;
        
        const mode = document.querySelector('input[name="mode"]:checked').value;
        let problemStr = "";

        if (mode === "slopeInt") {
            let b = Math.floor(Math.random() * 17) - 8; 
            let num = getRandomNonZero(-5, 5);
            let den = Math.floor(Math.random() * 4) + 1; 
            
            let divisor = gcd(num, den);
            num /= divisor;
            den /= divisor;

            targetA = num;
            targetB = -den;
            targetC = -den * b;

            let mStr = "";
            if (num === 1 && den === 1) mStr = "x";
            else if (num === -1 && den === 1) mStr = "-x";
            else if (den === 1) mStr = `${num}x`;
            else mStr = (num * den < 0 ? "-" : "") + `\\frac{${Math.abs(num)}}{${Math.abs(den)}}x`;

            let bStr = "";
            if (b > 0) bStr = mStr !== "" ? ` + ${b}` : `${b}`;
            else if (b < 0) bStr = mStr !== "" ? ` - ${Math.abs(b)}` : `${b}`;
            else if (mStr === "") bStr = "0"; 

            problemStr = `\\(y = ${mStr}${bStr}\\)`;

        } else {
            let xInt = getRandomNonZero(-8, 8);
            let yInt = getRandomNonZero(-8, 8);
            
            let A = yInt;
            let B = xInt;
            let C = xInt * yInt;

            let divisor = gcd(gcd(A, B), C);
            A /= divisor;
            B /= divisor;
            C /= divisor;

            if (A < 0) { A = -A; B = -B; C = -C; }

            targetA = A;
            targetB = B;
            targetC = C;

            let aStr = A === 1 ? "x" : (A === -1 ? "-x" : `${A}x`);
            if (A === 0) aStr = "";

            let bStr = "";
            if (B === 1) bStr = aStr !== "" ? "+ y" : "y";
            else if (B === -1) bStr = aStr !== "" ? "- y" : "-y";
            else if (B > 0) bStr = aStr !== "" ? `+ ${B}y` : `${B}y`;
            else if (B < 0) bStr = aStr !== "" ? `- ${Math.abs(B)}y` : `${B}y`;

            problemStr = `\\(${aStr} ${bStr} = ${C}\\)`;
        }

        p1 = { x: -2, y: -2 };
        p2 = { x: 2, y: 2 };
        
        if (targetA * p1.x + targetB * p1.y === targetC && targetA * p2.x + targetB * p2.y === targetC) {
            p1.y = -3; 
        }

        problemDisplay.innerHTML = problemStr;
        problemDisplay.className = "problem-display";
        
        if (window.renderMathInElement) {
            renderMathInElement(problemDisplay, {
                delimiters: [ {left: "\\(", right: "\\)", display: false} ]
            });
        }
        draw();
    }

    function mapX(mathX) { return originX + mathX * pixelsPerUnit; }
    function mapY(mathY) { return originY - mathY * pixelsPerUnit; }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Grid Lines
        ctx.lineWidth = 1;
        ctx.strokeStyle = "#ecf0f1";
        for (let i = -10; i <= 10; i++) {
            ctx.beginPath(); ctx.moveTo(mapX(i), 0); ctx.lineTo(mapX(i), canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, mapY(i)); ctx.lineTo(canvas.width, mapY(i)); ctx.stroke();
        }

        // Draw Axes
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#7f8c8d";
        ctx.beginPath(); ctx.moveTo(mapX(0), 0); ctx.lineTo(mapX(0), canvas.height); ctx.stroke(); 
        ctx.beginPath(); ctx.moveTo(0, mapY(0)); ctx.lineTo(canvas.width, mapY(0)); ctx.stroke(); 

        // Draw Ticks and Labels
        ctx.fillStyle = "#34495e";
        ctx.font = "12px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        for (let i = -10; i <= 10; i++) {
            if (i !== 0) {
                // X-axis ticks
                ctx.beginPath(); ctx.moveTo(mapX(i), mapY(0) - 4); ctx.lineTo(mapX(i), mapY(0) + 4); ctx.stroke();
                // X-axis numbers
                if (i % 2 === 0) ctx.fillText(i, mapX(i), mapY(0) + 14);

                // Y-axis ticks
                ctx.beginPath(); ctx.moveTo(mapX(0) - 4, mapY(i)); ctx.lineTo(mapX(0) + 4, mapY(i)); ctx.stroke();
                // Y-axis numbers
                if (i % 2 === 0) {
                    ctx.textAlign = "right";
                    ctx.fillText(i, mapX(0) - 8, mapY(i));
                    ctx.textAlign = "center"; 
                }
            }
        }

        // Draw Line connecting P1 and P2
        if (p1.x !== p2.x || p1.y !== p2.y) {
            ctx.lineWidth = 3;
            ctx.strokeStyle = "#3498db";
            
            let dx = p2.x - p1.x;
            let dy = p2.y - p1.y;
            
            let extendX1 = p1.x - dx * 20;
            let extendY1 = p1.y - dy * 20;
            let extendX2 = p2.x + dx * 20;
            let extendY2 = p2.y + dy * 20;

            ctx.beginPath();
            ctx.moveTo(mapX(extendX1), mapY(extendY1));
            ctx.lineTo(mapX(extendX2), mapY(extendY2));
            ctx.stroke();
        }

        drawPoint(p1, "#e74c3c");
        drawPoint(p2, "#e74c3c");
    }

    function drawPoint(p, color) {
        ctx.beginPath();
        ctx.arc(mapX(p.x), mapY(p.y), 8, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();
        ctx.strokeStyle = "#c0392b";
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    function getMousePos(evt) {
        const rect = canvas.getBoundingClientRect();
        
        // Safely handle both mouse and touch events
        let clientX = evt.clientX;
        let clientY = evt.clientY;
        if (evt.touches && evt.touches.length > 0) {
            clientX = evt.touches[0].clientX;
            clientY = evt.touches[0].clientY;
        }
        
        // Calculate the scaling ratio (Internal Canvas Size / Visual CSS Size)
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        
        // Apply the scale so the coordinates match, no matter how small the screen is
        const pixelX = (clientX - rect.left) * scaleX;
        const pixelY = (clientY - rect.top) * scaleY;
        
        return {
            x: Math.round((pixelX - originX) / pixelsPerUnit),
            y: Math.round((originY - pixelY) / pixelsPerUnit)
        };
    }

    function handleStart(evt) {
        if (isTransitioning) return;
        // Prevent default only if cancelable (stops mobile scrolling while dragging)
        if (evt.cancelable) evt.preventDefault(); 
        
        const pos = getMousePos(evt);
        
        // Increased hit tolerance from 1 to 1.5 to make it easier for fat fingers on mobile
        const hitTolerance = 1.5;
        
        if (Math.abs(pos.x - p1.x) <= hitTolerance && Math.abs(pos.y - p1.y) <= hitTolerance) {
            draggingPoint = p1;
        }
        else if (Math.abs(pos.x - p2.x) <= hitTolerance && Math.abs(pos.y - p2.y) <= hitTolerance) {
            draggingPoint = p2;
        }
    }

    function handleMove(evt) {
        if (!draggingPoint) return;
        if (evt.cancelable) evt.preventDefault(); 
        
        const pos = getMousePos(evt);
        
        draggingPoint.x = Math.max(-10, Math.min(10, pos.x));
        draggingPoint.y = Math.max(-10, Math.min(10, pos.y));
        draw();
    }

    function handleEnd() {
        draggingPoint = null;
    }

    canvas.addEventListener('mousedown', handleStart);
    canvas.addEventListener('mousemove', handleMove);
    canvas.addEventListener('mouseup', handleEnd);
    canvas.addEventListener('mouseleave', handleEnd);

    // Passive false is needed to prevent scrolling while drawing
    canvas.addEventListener('touchstart', handleStart, {passive: false});
    canvas.addEventListener('touchmove', handleMove, {passive: false});
    canvas.addEventListener('touchend', handleEnd);

    function checkAnswer() {
        if (isTransitioning) return;

        if (p1.x === p2.x && p1.y === p2.y) return;

        const p1Correct = (targetA * p1.x + targetB * p1.y === targetC);
        const p2Correct = (targetA * p2.x + targetB * p2.y === targetC);

        if (p1Correct && p2Correct) {
            isTransitioning = true;
            problemDisplay.classList.add('correct');
            currentStreak++;
            streakDisplay.innerText = currentStreak;
            
            ctx.strokeStyle = "#2ecc71";
            ctx.stroke();

            setTimeout(() => {
                isTransitioning = false;
                generateProblem();
            }, 1000);
        } else {
            problemDisplay.classList.add('wrong');
            currentStreak = 0;
            streakDisplay.innerText = currentStreak;
            
            setTimeout(() => {
                problemDisplay.classList.remove('wrong');
            }, 500);
        }
    }
</script>

</body>
</html>
