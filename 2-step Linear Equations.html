<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastering 2-Step Equations</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-top: 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .streak-counter {
            font-size: 16px;
            color: #7f8c8d;
            margin-bottom: 10px;
            font-weight: bold;
        }
        #streak { color: #3498db; font-size: 20px; }
        
        .equation-display {
            font-size: 42px;
            margin: 20px 0;
            padding: 20px;
            background-color: #f0f8ff;
            border-radius: 8px;
            border: 2px solid #3498db;
            color: #2c3e50;
            transition: all 0.3s;
        }
        .equation-display.error {
            background-color: #fadbd8;
            border-color: #e74c3c;
            animation: shake 0.4s;
        }

        .prompt-text {
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
            margin: 20px 0 15px 0;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .mc-btn {
            background-color: white;
            color: #2c3e50;
            border: 2px solid #bdc3c7;
            padding: 15px 10px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 #bdc3c7;
            font-family: inherit;
        }

        .mc-btn:hover {
            background-color: #f8f9fa;
            border-color: #3498db;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #2980b9;
        }

        .mc-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .history-log {
            text-align: left;
            color: #7f8c8d;
            font-size: 20px;
            margin-bottom: 10px;
            min-height: 30px;
        }
        .history-item { margin-bottom: 5px; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }

        @media (max-width: 480px) {
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Algebra Step-by-Step</h1>
    <div class="streak-counter">Current Streak: <span id="streak">0</span></div>
    
    <div class="history-log" id="historyLog"></div>
    <div class="equation-display" id="equationDisplay"></div>
    
    <div class="prompt-text" id="promptText">What is the first step?</div>

    <div class="options-grid" id="optionsGrid">
        </div>
</div>

<script>
    let streak = 0;
    
    // Math State
    let state = {
        a: 0, b: 0, c: 0, x: 0,
        c_prime: 0 // The value of ax after the constant is moved
    };

    function getRandomNonZero(min, max) {
        let val;
        do { val = Math.floor(Math.random() * (max - min + 1)) + min; } while (val === 0 || val === 1 || val === -1);
        return val;
    }

    function formatEq(coeff, constant, right) {
        let aStr = coeff === 1 ? "x" : (coeff === -1 ? "-x" : `${coeff}x`);
        let bStr = constant > 0 ? `+ ${constant}` : (constant < 0 ? `- ${Math.abs(constant)}` : "");
        return `${aStr} ${bStr} = ${right}`;
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function renderMath() {
        if (window.renderMathInElement) {
            renderMathInElement(document.body, { delimiters: [{left: "\\(", right: "\\)", display: false}] });
        }
    }

    // --- Core Game Loop ---
    function startNewProblem() {
        // Generate Integer Solution
        state.a = getRandomNonZero(-9, 9);
        state.x = getRandomNonZero(-12, 12);
        
        let rawB;
        do { rawB = getRandomNonZero(-20, 20); } while (rawB === state.a || rawB === state.x);
        state.b = rawB;
        
        state.c = (state.a * state.x) + state.b;
        state.c_prime = state.c - state.b;

        document.getElementById('historyLog').innerHTML = '';
        document.getElementById('equationDisplay').innerHTML = `\\(${formatEq(state.a, state.b, state.c)}\\)`;
        
        loadPhase1Action();
    }

    function wrongAnswer() {
        streak = 0;
        document.getElementById('streak').innerText = streak;
        
        let display = document.getElementById('equationDisplay');
        display.classList.add('error');
        
        setTimeout(() => {
            display.classList.remove('error');
            startNewProblem();
        }, 600);
    }

    function renderButtons(options, callback) {
        let grid = document.getElementById('optionsGrid');
        grid.innerHTML = '';
        
        let shuffled = shuffle([...options]);
        shuffled.forEach(opt => {
            let btn = document.createElement('button');
            btn.className = 'mc-btn';
            btn.innerHTML = opt.text;
            btn.onclick = () => {
                if (opt.isCorrect) callback();
                else wrongAnswer();
            };
            grid.appendChild(btn);
        });
        renderMath();
    }

    // --- Phase 1: Move Constant ---
    function loadPhase1Action() {
        document.getElementById('promptText').innerText = "What is the correct strategy?";
        
        let correctAction = state.b > 0 ? `Subtract ${state.b} from both sides` : `Add ${Math.abs(state.b)} to both sides`;
        let wrongAction1 = state.b > 0 ? `Add ${state.b} to both sides` : `Subtract ${Math.abs(state.b)} from both sides`;
        
        let options = [
            { text: correctAction, isCorrect: true },
            { text: wrongAction1, isCorrect: false },
            { text: `Divide both sides by ${state.a}`, isCorrect: false },
            { text: `Subtract ${state.a} from both sides`, isCorrect: false }
        ];
        
        renderButtons(options, loadPhase1Result);
    }

    function loadPhase1Result() {
        document.getElementById('promptText').innerText = "What is the resulting equation?";
        
        let correctEq = `\\(${formatEq(state.a, 0, state.c_prime)}\\)`;
        let wrongEq1 = `\\(${formatEq(state.a, 0, state.c + state.b)}\\)`; // Did the opposite operation
        let wrongEq2 = `\\(${formatEq(1, 0, state.c_prime)}\\)`; // Dropped the coefficient
        let wrongEq3 = `\\(${formatEq(state.a, 0, state.c_prime + 1)}\\)`; // Arithmetic error
        
        let options = [
            { text: correctEq, isCorrect: true },
            { text: wrongEq1, isCorrect: false },
            { text: wrongEq2, isCorrect: false },
            { text: wrongEq3, isCorrect: false }
        ];

        renderButtons(options, () => {
            // Push old equation to history, update main display
            document.getElementById('historyLog').innerHTML = `\\(${formatEq(state.a, state.b, state.c)}\\)`;
            document.getElementById('equationDisplay').innerHTML = correctEq;
            loadPhase2Action();
        });
    }

    // --- Phase 2: Clear Coefficient ---
    function loadPhase2Action() {
        document.getElementById('promptText').innerText = "What is the next strategy?";
        
        let options = [
            { text: `Divide both sides by ${state.a}`, isCorrect: true },
            { text: `Multiply both sides by ${state.a}`, isCorrect: false },
            { text: `Subtract ${state.a} from both sides`, isCorrect: false },
            { text: `Divide both sides by ${state.c_prime}`, isCorrect: false }
        ];

        renderButtons(options, loadPhase2Result);
    }

    function loadPhase2Result() {
        document.getElementById('promptText').innerText = "What is the final solution?";
        
        let correctEq = `\\(x = ${state.x}\\)`;
        let wrongEq1 = `\\(x = ${-state.x}\\)`; // Sign error
        let wrongEq2 = `\\(x = ${state.x + (state.x > 0 ? 1 : -1)}\\)`; // Off by one arithmetic error
        let wrongEq3 = state.c_prime !== 0 ? `\\(x = ${Math.floor(state.a / state.c_prime)}\\)` : `\\(x = ${state.a}\\)`; // Inverted division
        
        // Failsafe to ensure distinct distractors
        if (wrongEq1 === correctEq) wrongEq1 = `\\(x = 0\\)`;

        let options = [
            { text: correctEq, isCorrect: true },
            { text: wrongEq1, isCorrect: false },
            { text: wrongEq2, isCorrect: false },
            { text: wrongEq3, isCorrect: false }
        ];

        renderButtons(options, () => {
            streak++;
            document.getElementById('streak').innerText = streak;
            
            // Flash green for success
            let display = document.getElementById('equationDisplay');
            display.innerHTML = `\\(\\mathbf{x = ${state.x}}\\)`;
            display.style.backgroundColor = '#e8f8f5';
            display.style.borderColor = '#2ecc71';
            
            document.getElementById('promptText').innerText = "Excellent!";
            document.getElementById('optionsGrid').innerHTML = `<button class="mc-btn" style="grid-column: 1 / -1; background-color: #2ecc71; color: white;" onclick="resetDisplayAndStart()">Generate Next Equation</button>`;
            renderMath();
        });
    }

    function resetDisplayAndStart() {
        let display = document.getElementById('equationDisplay');
        display.style.backgroundColor = '#f0f8ff';
        display.style.borderColor = '#3498db';
        startNewProblem();
    }

    // Initialize
    window.onload = startNewProblem;
</script>

</body>
</html>
