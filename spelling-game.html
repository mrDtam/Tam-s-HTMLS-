<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Spelling Adventure!</title>
    
    <style>
        :root {
            --primary: #9b59b6;
            --secondary: #3498db;
            --accent: #f1c40f;
            --dark: #2c3e50;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif;
            background-color: #e8f4f8;
            color: var(--dark);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 90vh;
            user-select: none;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 550px;
            width: 100%;
            text-align: center;
            border: 4px solid var(--primary);
        }

        h1 {
            color: var(--primary);
            font-size: 32px;
            margin-top: 0;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 18px;
            margin-bottom: 25px;
        }

        /* --- Menu Screen --- */
        #menuScreen {
            display: block;
        }

        .play-btn {
            background-color: var(--secondary);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 8px 0 #2980b9;
            transition: transform 0.1s, box-shadow 0.1s;
            font-family: inherit;
            margin-top: 20px;
        }

        .play-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #2980b9;
        }

        /* --- Game Screen --- */
        #gameScreen {
            display: none;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            background-color: #ecf0f1;
            color: #7f8c8d;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            transition: background-color 0.2s;
        }
        .icon-btn:hover { background-color: #e0e6ed; }

        .streak-counter {
            font-size: 20px;
            font-weight: bold;
            color: #d35400;
            background: #fdebd0;
            padding: 10px 20px;
            border-radius: 15px;
            border: 2px solid #f39c12;
        }

        .prompt-text {
            font-size: 24px;
            font-weight: bold;
            color: var(--dark);
            margin: 10px 0 25px 0;
            padding: 15px;
            background: #f0f3f4;
            border-radius: 15px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .option-btn {
            background-color: white;
            color: var(--dark);
            border: 3px solid var(--secondary);
            padding: 20px 10px;
            font-size: 28px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 0 var(--secondary);
            font-family: inherit;
            letter-spacing: 1px;
        }

        .option-btn:active:not(:disabled) {
            transform: translateY(5px);
            box-shadow: 0 0 0 var(--secondary);
        }

        .option-btn.correct {
            background-color: #2ecc71 !important;
            border-color: #27ae60 !important;
            color: white !important;
            box-shadow: 0 5px 0 #27ae60 !important;
            transform: scale(1.02);
        }

        .option-btn.wrong {
            background-color: #fadbd8;
            border-color: #e74c3c;
            color: #c0392b;
            box-shadow: 0 2px 0 #c0392b;
            transform: translateY(3px);
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) translateY(3px); }
            25% { transform: translateX(-5px) translateY(3px); }
            50% { transform: translateX(5px) translateY(3px); }
            75% { transform: translateX(-5px) translateY(3px); }
        }

        .confetti {
            position: absolute;
            font-size: 40px;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
        }

    </style>
</head>
<body>

<div class="container">
    
    <div id="menuScreen">
        <h1>📚 Spot the Imposter! 🕵️‍♀️</h1>
        <p class="subtitle">Only one word is spelled correctly. Can you find it?</p>
        <button class="play-btn" onclick="startGame()">Start Playing!</button>
    </div>

    <div id="gameScreen">
        <div class="game-header">
            <div class="btn-group">
                <button class="icon-btn" onclick="showMenu()">🔙 Menu</button>
                <button class="icon-btn" id="muteBtn" onclick="toggleMusic()">🎵 On</button>
            </div>
            <div class="streak-counter">🔥 Streak: <span id="streakDisplay">0</span></div>
        </div>

        <div class="prompt-text">
            Which word is spelled correctly?
        </div>

        <div class="options-grid" id="optionsGrid">
            </div>
    </div>

</div>

<script>
    // --- 100 Word Database ---
    const wordBank = [
        // Original Trick Words (25)
        { c: "because", w: ["becuse", "becuase", "beacause"] },
        { c: "friend", w: ["freind", "frend", "friand"] },
        { c: "beautiful", w: ["beutiful", "beautyful", "beatifull"] },
        { c: "surprise", w: ["suprise", "serprise", "surprize"] },
        { c: "caught", w: ["cought", "cawt", "caugt"] },
        { c: "enough", w: ["enuff", "enoug", "inough"] },
        { c: "library", w: ["libary", "librery", "libarey"] },
        { c: "answer", w: ["anser", "answre", "ancer"] },
        { c: "ocean", w: ["oshun", "ocian", "osean"] },
        { c: "science", w: ["sience", "sciense", "sicence"] },
        { c: "scissors", w: ["sissors", "scisors", "cissors"] },
        { c: "island", w: ["iland", "iseland", "islend"] },
        { c: "tomorrow", w: ["tommorow", "tomorow", "tommorrow"] },
        { c: "different", w: ["diffrent", "diferent", "differant"] },
        { c: "piece", w: ["peice", "peese", "peece"] },
        { c: "quiet", w: ["quite", "qiuet", "quyet"] },
        { c: "through", w: ["thru", "throug", "threwgh"] },
        { c: "minute", w: ["minit", "minuet", "minnut"] },
        { c: "people", w: ["peple", "peopel", "peeple"] },
        { c: "believe", w: ["beleive", "belive", "beleeve"] },
        { c: "weird", w: ["wierd", "werid", "weerd"] },
        { c: "guess", w: ["gess", "geuss", "gesse"] },
        { c: "machine", w: ["masheen", "machin", "macheen"] },
        { c: "straight", w: ["strate", "straigt", "streight"] },
        { c: "Wednesday", w: ["Wensday", "Wednesdey", "Whensday"] },
        
        // Days of the week (6 - Wednesday is above)
        { c: "Monday", w: ["Munday", "Mondy", "Monnday"] },
        { c: "Tuesday", w: ["Teusday", "Tuseday", "Tusday"] },
        { c: "Thursday", w: ["Thirsday", "Thersday", "Thurday"] },
        { c: "Friday", w: ["Fridaye", "Fridy", "Fryday"] },
        { c: "Saturday", w: ["Saterday", "Saturdy", "Satterday"] },
        { c: "Sunday", w: ["Sundy", "Sunnday", "Sondy"] },

        // Months of the year (11)
        { c: "January", w: ["Janury", "Janurary", "Januery"] },
        { c: "February", w: ["Febuary", "Febrary", "Feburary"] },
        { c: "March", w: ["Martch", "Mrtch", "Marcht"] },
        { c: "April", w: ["Aperil", "Aprill", "Apeirl"] },
        { c: "June", w: ["Joon", "Juen", "Junne"] },
        { c: "July", w: ["Juli", "Juley", "Jooly"] },
        { c: "August", w: ["Augest", "Ogust", "Augast"] },
        { c: "September", w: ["Septemper", "Septamber", "Septeber"] },
        { c: "October", w: ["Octobar", "Oktuber", "Octobor"] },
        { c: "November", w: ["Novembar", "Novamber", "Novembre"] },
        { c: "December", w: ["Decembar", "Desember", "Decembre"] },

        // Numbers (12)
        { c: "eight", w: ["eigt", "aight", "eith"] },
        { c: "eleven", w: ["elevan", "ellven", "alevin"] },
        { c: "twelve", w: ["twelf", "twelv", "twellve"] },
        { c: "thirteen", w: ["thurteen", "thirtien", "thirten"] },
        { c: "fourteen", w: ["forteen", "fourtien", "fourten"] },
        { c: "fifteen", w: ["fiveteen", "fiften", "fivten"] },
        { c: "twenty", w: ["twentey", "twentie", "twintey"] },
        { c: "thirty", w: ["thurty", "thierty", "thirtie"] },
        { c: "forty", w: ["fourty", "forthey", "fortey"] },
        { c: "fifty", w: ["fivety", "fiftey", "fifftey"] },
        { c: "hundred", w: ["hundered", "hundrid", "hunderd"] },
        { c: "thousand", w: ["thousend", "thosand", "thouzand"] },

        // Colors (6)
        { c: "purple", w: ["purpel", "purpple", "pirple"] },
        { c: "orange", w: ["orenge", "oringe", "orrange"] },
        { c: "yellow", w: ["yelow", "yellew", "yallow"] },
        { c: "brown", w: ["broun", "browne", "braun"] },
        { c: "white", w: ["wite", "whight", "whiet"] },
        { c: "black", w: ["blak", "bllack", "blacke"] },

        // Shapes (4)
        { c: "square", w: ["sqare", "squair", "skware"] },
        { c: "circle", w: ["sircle", "circel", "surcle"] },
        { c: "triangle", w: ["tryangle", "triangel", "triangal"] },
        { c: "rectangle", w: ["rectangel", "recktangle", "rectangal"] },

        // Animals (10)
        { c: "monkey", w: ["monky", "munkey", "monkee"] },
        { c: "elephant", w: ["elefant", "eliphant", "ellephant"] },
        { c: "giraffe", w: ["jeraffe", "giraff", "jiraffe"] },
        { c: "dolphin", w: ["dolfin", "dolphen", "dallphin"] },
        { c: "penguin", w: ["pinguin", "pengwin", "pengin"] },
        { c: "turtle", w: ["tertle", "turttel", "turtel"] },
        { c: "rabbit", w: ["rabit", "rabbet", "rhabit"] },
        { c: "lizard", w: ["lizzard", "liserd", "lizerd"] },
        { c: "spider", w: ["spidar", "speider", "spyder"] },
        { c: "butterfly", w: ["butterfley", "buterfly", "budderfly"] },

        // Family / People (6)
        { c: "mother", w: ["muther", "mothar", "mothre"] },
        { c: "father", w: ["fathor", "fathar", "fathre"] },
        { c: "brother", w: ["bruther", "brothar", "brothre"] },
        { c: "sister", w: ["siser", "sistar", "cister"] },
        { c: "family", w: ["famly", "familey", "fammily"] },
        { c: "cousin", w: ["cuzin", "cousing", "cosin"] },

        // Nature / Space (10)
        { c: "weather", w: ["wether", "weathur", "waether"] },
        { c: "summer", w: ["sumer", "sommar", "summur"] },
        { c: "winter", w: ["wintar", "wintre", "wonter"] },
        { c: "autumn", w: ["autum", "ottumn", "awtumn"] },
        { c: "spring", w: ["sprin", "sping", "spreng"] },
        { c: "flower", w: ["flowre", "flour", "flowar"] },
        { c: "forest", w: ["forrest", "forist", "forast"] },
        { c: "mountain", w: ["montain", "mountin", "mountein"] },
        { c: "planet", w: ["plannet", "planit", "planat"] },
        { c: "earth", w: ["erth", "urth", "earht"] },

        // School / Home Items (10)
        { c: "school", w: ["shool", "skool", "scool"] },
        { c: "teacher", w: ["techer", "teachar", "teechir"] },
        { c: "pencil", w: ["pensil", "pencel", "pensel"] },
        { c: "window", w: ["windo", "wendow", "windoe"] },
        { c: "kitchen", w: ["kichen", "kitchin", "kitschen"] },
        { c: "garden", w: ["gardan", "gardin", "gareden"] },
        { c: "picture", w: ["pitcher", "picter", "pikcher"] },
        { c: "computer", w: ["computter", "computar", "compyuter"] },
        { c: "blanket", w: ["blankit", "blancket", "blankat"] },
        { c: "pillow", w: ["pilow", "pillo", "pellow"] }
    ];

    let currentStreak = 0;
    let isTransitioning = false;
    let currentWordObj = null;

    // --- Audio Engine (Web Audio API) ---
    let audioCtx;
    let bgmInterval;
    let isMusicPlaying = true;

    // Happy pentatonic scale
    const pentatonicScale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25];

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playSuccessSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.type = 'triangle'; 
        
        const now = audioCtx.currentTime;
        osc.frequency.setValueAtTime(523.25, now);
        osc.frequency.setValueAtTime(659.25, now + 0.1);
        osc.frequency.setValueAtTime(783.99, now + 0.2);
        
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(0.15, now + 0.05); 
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
        
        osc.start(now);
        osc.stop(now + 0.6);
    }

    function playWrongSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.type = 'sine'; 
        
        const now = audioCtx.currentTime;
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(150, now + 0.2);
        
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(0.1, now + 0.02);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
        
        osc.start(now);
        osc.stop(now + 0.2);
    }

    function startBackgroundMusic() {
        if (!audioCtx || !isMusicPlaying || bgmInterval) return;
        
        bgmInterval = setInterval(() => {
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.type = 'sine'; 
            
            const randomFreq = pentatonicScale[Math.floor(Math.random() * pentatonicScale.length)];
            osc.frequency.value = randomFreq;
            
            const now = audioCtx.currentTime;
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(0.03, now + 0.1); 
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 1.5); 
            
            osc.start(now);
            osc.stop(now + 1.5);
        }, 500);
    }

    function stopBackgroundMusic() {
        if (bgmInterval) {
            clearInterval(bgmInterval);
            bgmInterval = null;
        }
    }

    function toggleMusic() {
        isMusicPlaying = !isMusicPlaying;
        const muteBtn = document.getElementById('muteBtn');
        if (isMusicPlaying) {
            muteBtn.innerText = "🎵 On";
            startBackgroundMusic();
        } else {
            muteBtn.innerText = "🔇 Off";
            stopBackgroundMusic();
        }
    }

    // --- Game Logic ---
    function startGame() {
        initAudio(); 
        if (isMusicPlaying) startBackgroundMusic();

        currentStreak = 0;
        document.getElementById('streakDisplay').innerText = currentStreak;
        
        document.getElementById('menuScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';
        
        generateProblem();
    }

    function showMenu() {
        stopBackgroundMusic();
        document.getElementById('gameScreen').style.display = 'none';
        document.getElementById('menuScreen').style.display = 'block';
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function generateProblem() {
        isTransitioning = false;
        
        let newWordObj;
        do {
            newWordObj = wordBank[Math.floor(Math.random() * wordBank.length)];
        } while (currentWordObj === newWordObj);
        
        currentWordObj = newWordObj;

        let options = [currentWordObj.c, ...currentWordObj.w];
        let optionsArray = shuffleArray(options);
        
        const grid = document.getElementById('optionsGrid');
        grid.innerHTML = ''; 

        optionsArray.forEach(opt => {
            let btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = (e) => handleGuess(btn, opt === currentWordObj.c, e);
            grid.appendChild(btn);
        });
    }

    function handleGuess(btn, isCorrect, event) {
        if (isTransitioning || btn.classList.contains('wrong')) return;

        if (isCorrect) {
            isTransitioning = true;
            btn.classList.add('correct');
            playSuccessSound();
            
            currentStreak++;
            document.getElementById('streakDisplay').innerText = currentStreak;

            createSparkle(event.clientX, event.clientY);

            setTimeout(generateProblem, 1200);
        } else {
            btn.classList.add('wrong');
            playWrongSound();
            
            currentStreak = 0; 
            document.getElementById('streakDisplay').innerText = currentStreak;
        }
    }

    // --- Visual Effects ---
    function createSparkle(x, y) {
        const emojis = ['🌟', '✨', '🎈', '🎉', '📚'];
        const sparkle = document.createElement('div');
        sparkle.innerText = emojis[Math.floor(Math.random() * emojis.length)];
        sparkle.className = 'confetti';
        sparkle.style.left = (x - 20) + 'px';
        sparkle.style.top = (y - 20) + 'px';
        
        document.body.appendChild(sparkle);

        setTimeout(() => {
            sparkle.remove();
        }, 1000);
    }

</script>

</body>
</html>
